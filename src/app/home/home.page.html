<!-- ion-header: Contenedor para la barra superior (navbar) de la página -->
<ion-header [translucent]="true">
  <!-- ion-toolbar: La barra en sí, donde ubicamos el título y los botones -->
  <ion-toolbar>
    <!-- ion-buttons: Contenedor para agrupar botones. slot="start" lo coloca a la izquierda -->
    <ion-buttons slot="start">
      <!-- ion-menu-button: Botón automático de Ionic que abre/cierra el Sidemenu -->
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <!-- ion-title: El texto del título de esta página -->
    <ion-title>Inicio</ion-title>
  </ion-toolbar>
</ion-header>

<!-- ion-content: Es el área principal desplazable (scrollable) donde va el contenido de tu app -->
<ion-content [fullscreen]="true" class="ion-padding">
  <div class="home-container">
    <div class="image-wrapper">
      <!-- Usamos assets locales para cargar la imagen ilustrativa -->
      <img src="assets/susan_bg.png" alt="Ilustración programando" />
    </div>

    <div class="text-content">
      <h1 class="main-title">Susan Molina</h1>
      <h2 class="subtitle">PNFI INFORMATICA</h2>
    </div>

    <div class="cta-container">
      <!-- ion-button: Botón nativo de Ionic. Usamos routerLink de Angular para navegar a la ruta /personal-info al hacer clic -->
      <ion-button expand="block" shape="round" color="primary" routerLink="/personal-info">
        Conoce más sobre mí
      </ion-button>
    </div>
  </div>
</ion-content>
